<header>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
      <div class="left-side">
        <a href="{{ '/' | relative_url }}" class="logo">
          <img src="{{ '/assets/img/favicon.ico' | relative_url }}" alt="LumoLetters Icon" class="top-nav-icon">
          LumoLetters
        </a>
      </div>
      <div class="right-side">
        {% if page.url == "/" %}
          <!-- On home page, scroll to sections -->
          <a href="{{ '/about/' | relative_url }}" class="top-nav-link">About</a>
          <a href="#services" class="top-nav-link">Services</a>
          <a href="#testimonials" class="top-nav-link">Testimonials</a>
          <a href="#contact" class="top-nav-link">Contact</a>
          <a href="{{ '/sign-up/' | relative_url }}" class="top-nav-link">Sign Up</a>
        {% else %}
          <!-- On other pages, navigate to separate pages -->
          <a href="{{ '/about/' | relative_url }}" class="top-nav-link">About</a>
          <a href="{{ '/services/' | relative_url }}" class="top-nav-link">Services</a>
          <a href="{{ '/testimonials/' | relative_url }}" class="top-nav-link">Testimonials</a>
          <a href="{{ '/contact/' | relative_url }}" class="top-nav-link">Contact</a>
          <a href="{{ '/sign-up/' | relative_url }}" class="top-nav-link">Sign Up</a>
        {% endif %}
      </div>
    </nav>
  </header>
