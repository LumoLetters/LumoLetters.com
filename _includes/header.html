<!-- _includes/header.html -->
<header>
  <!-- Top Navigation Bar -->
  <nav class="top-nav">
    <div class="left-side">
      <a href="{{ '/' | relative_url }}" class="logo">
        <img src="{{ '/assets/img/favicon.ico' | relative_url }}" alt="LumoLetters Icon" class="top-nav-icon">
        LumoLetters
      </a>
    </div>
    <div class="right-side">
      {% for item in site.data.navigation.main_nav %}
           <a href="{{ item.url | relative_url }}" class="top-nav-link">{{ item.title }}</a>
      {% endfor %}
    </div>
  </nav>
</header>
