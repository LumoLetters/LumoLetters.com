<!-- dashboard.html: User Dashboard page -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="{{ '/assets/js/components/auth.js' | relative_url }}" defer></script>
</head>
<body>
    {% include layout/header.html %}
    
    <div class="dashboard-container">
        {% include layout/navigation.html %}
        
        <main class="main-content">
            <div id="dashboardContent">
                <h1>Welcome to Your Dashboard</h1>
                <p>Select an option from the sidebar to get started.</p>
                <div id="userProfileContainer">
                    <p>Name: <span id="userName"></span></p>
                    <p>Interests: <span id="userInterests"></span></p>
                    <p>Topics: <span id="userTopics"></span></p>
                    <p>Address: <span id="userAddress"></span></p>
                    <p>Payment-Plan: <span id="payment-plan"></span></p>
                    <p>Payment-Method: <span id="payment-method"></span></p>
                  </div>
            </div>
        </main>
    </div>
    
    {% include layout/footer.html %}

    <script src="/assets/js/pages/dashboard.js"></script>

    <script>
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on('init', (user) => {
                if (!user) {
                    // User is not logged in, redirect to login page
                    window.location.href = "/login"; // Change to your login page URL
                }
            });

            window.netlifyIdentity.init();
        }
    </script>
</body>
</html>
